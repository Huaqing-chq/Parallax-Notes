<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Site.Title }}</title>
    <style>
        /* 暴力清除主题背景 */
        html, body, div, main, section, article,
        header, footer, nav, aside,
        .main-wrapper, .wrapper, .container, .content,
        .article, .post {
            background: transparent !important;
            background-color: transparent !important;
            background-image: none !important;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, 
                         "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background: url('https://s41.ax1x.com/2026/05/03/pe75OEj.png') 
                        no-repeat center center fixed !important;
            background-size: cover !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 毛玻璃大卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 3rem 4rem;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            color: #fff;
            z-index: 1;
            max-width: 480px;
            width: 90%;
        }

        .site-title {
            font-size: 2.8rem;
            font-weight: 700;
            margin: 0 0 2rem 0;
            color: #fff !important;
            letter-spacing: 0.02em;
        }

        .enter-btn {
            display: inline-block;
            font-size: 1.3rem;
            font-weight: 500;
            color: #fff !important;
            text-decoration: none;
            padding: 0.7rem 2.5rem;
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 2rem;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            transition: background 0.3s, border-color 0.3s;
            margin-bottom: 2.2rem;
        }

        .enter-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: #fff;
        }

        /* 状态看板容器 */
        .status-bars {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
            margin-top: 0.5rem;
        }

        /* 每一条的样式 */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            padding: 0.75rem 1.2rem;
            border-radius: 1rem;
            font-size: 0.95rem;
            color: #fff;
            transition: background 0.3s;
        }

        .status-bar:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .status-bar .name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60%;
        }

        .status-bar .right {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        /* 状态指示圆点 */
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #888;
            transition: background-color 0.4s;
        }
        .status-dot.online  { background-color: #4ade80; }
        .status-dot.paused  { background-color: #facc15; }
        .status-dot.offline { background-color: #f87171; }

        .uptime {
            font-weight: 500;
            min-width: 55px;
            text-align: right;
        }

        @media (max-width: 600px) {
            .glass-card {
                padding: 2rem 1.5rem;
            }
            .site-title {
                font-size: 2rem;
            }
            .enter-btn {
                font-size: 1.1rem;
            }
            .status-bar {
                font-size: 0.85rem;
                padding: 0.65rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1 class="site-title">{{ .Site.Title }}</h1>
        <a class="enter-btn" href="{{ "posts" | relURL }}">进入博客</a>

        <!-- 状态看板将由 JS 动态填充 -->
        <div class="status-bars" id="statusBars">
            <div class="status-bar">
                <span class="name">加载中...</span>
                <div class="right">
                    <span class="status-dot"></span>
                    <span class="uptime">--</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadStatus() {
            const container = document.getElementById('statusBars');
            try {
                const res = await fetch('/api/status');
                if (!res.ok) throw new Error('Network error');
                const data = await res.json();
                const monitors = data.monitors || [];

                if (monitors.length === 0) {
                    container.innerHTML = '<div class="status-bar"><span>暂无监控数据</span></div>';
                    return;
                }

                const statusMap = {
                    0: { class: 'paused',  label: '暂停' },
                    1: { class: 'offline', label: '故障' },
                    2: { class: 'online',  label: '正常' },
                    8: { class: 'offline', label: '故障' },
                    9: { class: 'offline', label: '宕机' }
                };

                container.innerHTML = monitors.map(m => {
                    const info = statusMap[m.status] || { class: '', label: '未知' };
                    return `
                        <div class="status-bar">
                            <span class="name" title="${m.name}">${m.name}</span>
                            <div class="right">
                                <span class="status-dot ${info.class}" title="${info.label}"></span>
                                <span class="uptime">${m.uptime}%</span>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                container.innerHTML = '<div class="status-bar"><span>状态拉取失败</span></div>';
            }
        }

        loadStatus();
    </script>
</body>
</html>
