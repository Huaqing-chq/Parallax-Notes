<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>银河系手记</title>
    <style>
        
        html, body, div, main, section, article, 
        header, footer, nav, aside,
        .main-wrapper, .wrapper, .container, .content, 
        .article, .post, .widget {
            background: transparent !important;
            background-color: transparent !important;
            background-image: none !important;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
        }

        body {
            
            background: url('https://s41.ax1x.com/2026/05/03/pe75OEj.png') no-repeat center center fixed !important;
            background-size: cover !important;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem; 
        }



        /* ===== 主卡片：标题 + 进入按钮 ===== */
        .glass-card-main {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 2.5rem;
            padding: 4rem 6rem;
            text-align: center;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
            color: #fff;
            z-index: 2;
            min-width: 320px;
            max-width: 85vw;
        }

        .site-title {
            font-size: 3rem;
            font-weight: 700;
            margin: 0 0 2.5rem 0;
            color: #fff !important;
            letter-spacing: 0.05em;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .enter-btn {
            display: inline-block;
            font-size: 1.3rem;
            font-weight: 500;
            color: #fff !important;
            text-decoration: none;
            padding: 0.8rem 3.5rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .enter-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* ===== 副卡片：独立分层监控胶囊 ===== */
        .status-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px; /* 胶囊长条状 */
            padding: 1rem 2.5rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            z-index: 2;
            min-width: 320px;
            max-width: 85vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 强制覆盖 Statuspage 脚本渲染出的白色背景，让其变透明 */
        .status-card iframe, .color-white {
            background: transparent !important;
            background-color: transparent !important;
        }

        /* 手机端完美适配 */
        @media (max-width: 600px) {
            .space-lyrics {
                font-size: 0.75rem;
                text-align: center;
                padding: 0 1rem;
            }
            .glass-card-main {
                padding: 3rem 2rem;
            }
            .site-title {
                font-size: 2.2rem;
            }
            .enter-btn {
                font-size: 1.1rem;
                padding: 0.7rem 2.5rem;
            }
            .status-card {
                padding: 0.8rem 1.5rem;
                border-radius: 20px;
            }
            body {
                gap: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="space-lyrics">Lost our gravity now we're weightless</div>

    <div class="glass-card-main">
        <h1 class="site-title">银河系手记</h1>
        <a class="enter-btn" href="{{ "posts" | relURL }}">进入博客</a>
    </div>

    <div class="status-card">
        <script src="https://galaxypedia2.statuspage.io/embed/script.js"></script>
    </div>

</body>
</html>
