<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>银河系手记</title>
    <style>
        /* 精准挖空主题的干扰背景，保留 body */
        html, main, section, article, 
        header, footer, nav, aside,
        .main-wrapper, .wrapper, .container, .content, 
        .article, .post, .widget {
            background: transparent !important;
            background-color: transparent !important;
            background-image: none !important;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
        }

        body {
            /* 森林背景图强制置底显示 */
            background-image: url('https://s41.ax1x.com/2026/05/03/pe75OEj.png') !important;
            background-repeat: no-repeat !important;
            background-position: center center !important;
            background-attachment: fixed !important;
            background-size: cover !important;
            
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem; 
        }

        /* ===== 顶端电影感全大写标语 ===== */
        .space-lyrics {
            color: rgba(240, 80, 80, 0.85);
            font-size: 0.85rem;
            letter-spacing: 3px;
            font-weight: 300;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            margin-bottom: -0.5rem;
        }

        /* ===== 主卡片：标题 + 进入按钮 ===== */
        .glass-card-main {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 2.5rem;
            padding: 4rem 6rem;
            text-align: center;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
            color: #fff;
            z-index: 2;
            width: 380px;
            max-width: 85vw;
        }

        .site-title {
            font-size: 3rem;
            font-weight: 700;
            margin: 0 0 2.5rem 0;
            color: #fff !important;
            letter-spacing: 0.05em;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .enter-btn {
            display: inline-block;
            font-size: 1.3rem;
            font-weight: 500;
            color: #fff !important;
            text-decoration: none;
            padding: 0.8rem 3.5rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .enter-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* ===== 副卡片：独立精致监控舱 ===== */
        .status-card-api {
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 2;
            width: 380px;
            max-width: 85vw;
            color: #fff;
            box-sizing: border-box;
        }

        .status-header {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .status-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .status-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .status-item:last-child {
            border-bottom: none;
        }

        .node-info {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.operational { background: #2ecc71; box-shadow: 0 0 8px #2ecc71; }
        .status-dot.degraded_performance { background: #f1c40f; box-shadow: 0 0 8px #f1c40f; }
        .status-dot.partial_outage { background: #e67e22; box-shadow: 0 0 8px #e67e22; }
        .status-dot.major_outage { background: #e74c3c; box-shadow: 0 0 8px #e74c3c; }

        .status-tag {
            font-size: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 50px;
            font-weight: 600;
        }
        .status-tag.operational { background: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid rgba(46, 204, 113, 0.4); }
        .status-tag.degraded_performance { background: rgba(241, 196, 15, 0.2); color: #f1c40f; border: 1px solid rgba(241, 196, 15, 0.4); }
        .status-tag.partial_outage { background: rgba(230, 126, 34, 0.2); color: #e67e22; border: 1px solid rgba(230, 126, 34, 0.4); }
        .status-tag.major_outage { background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid rgba(231, 76, 60, 0.4); }

        @media (max-width: 600px) {
            .space-lyrics { font-size: 0.75rem; text-align: center; }
            .glass-card-main { padding: 3rem 2rem; width: 85vw; }
            .site-title { font-size: 2.2rem; }
            .enter-btn { font-size: 1.1rem; padding: 0.7rem 2.5rem; }
            .status-card-api { width: 85vw; padding: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="space-lyrics">Lost our gravity now we're weightless</div>

    <div class="glass-card-main">
        <h1 class="site-title">银河系手记</h1>
        <a class="enter-btn" href="{{ "posts" | relURL }}">进入博客</a>
    </div>

    <div class="status-card-api">
        <div class="status-header">🌌 星际节点监测</div>
        <div class="status-list" id="galaxy-status-nodes">
            <div style="font-size: 0.85rem; color: rgba(255,255,255,0.4);">正在连接母星网络...</div>
        </div>
    </div>

    <script>
        const statusConfig = {
            'operational': { text: '正常', class: 'operational' },
            'degraded_performance': { text: '延迟', class: 'degraded_performance' },
            'partial_outage': { text: '波动', class: 'partial_outage' },
            'major_outage': { text: '异常', class: 'major_outage' }
        };

        // 核心改动：白名单过滤器，只允许这三个名字通过
        const allowedNodes = ["元维基", "银河百科全书", "门户网站"];

        async function fetchGalaxyStatus() {
            const container = document.getElementById('galaxy-status-nodes');
            try {
                const response = await fetch('https://galaxypedia2.statuspage.io/api/v2/summary.json');
                const data = await response.json();
                const components = data.components || [];
                
                let htmlContent = '';
                components.forEach(node => {
                    // 判断当前组件名是否在白名单中，不在就直接跳过
                    if (!allowedNodes.includes(node.name.trim())) return; 

                    const config = statusConfig[node.status] || { text: '未知', class: '' };
                    
                    htmlContent += `
                        <div class="status-item">
                            <div class="node-info">
                                <span class="status-dot ${config.class}"></span>
                                <span>${node.name}</span>
                            </div>
                            <span class="status-tag ${config.class}">${config.text}</span>
                        </div>
                    `;
                });
                
                container.innerHTML = htmlContent || '<div style="font-size:0.85rem;color:rgba(255,255,255,0.4);">未检测到活跃节点</div>';
            } catch (error) {
                console.error('API 读取失败:', error);
                container.innerHTML = '<div style="font-size:0.85rem;color:#e74c3c;">星际通信中断 (API Error)</div>';
            }
        }

        fetchGalaxyStatus();
        setInterval(fetchGalaxyStatus, 60000);
    </script>

</body>
</html>
